name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config core.editor true

      - name: Add Upstream
        run: |
          git remote add upstream https://github.com/Vendicated/Vencord.git || true
          git fetch upstream

      - name: Backup Custom Plugins
        run: cp -r src/plugins /tmp/my_plugins

      - name: Sync with Upstream
        run: |
          git rebase upstream/main || true
          while [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; do
            git checkout --theirs . || true
            git restore --staged src/plugins/ || true
            git checkout HEAD -- src/plugins/ || true
            git add .
            git rebase --continue || git rebase --skip
          done

      - name: Restore Custom Plugins
        run: |
          cp -r /tmp/my_plugins/* src/plugins/
          git add src/plugins/
          git diff --cached --quiet || git commit -m "chore: restore custom plugins after sync"

      - name: Push
        run: git push origin main --force
