name: Sync Upstream
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Git
        run: |
          git config user.name "${{ secrets.GIT_USERNAME }}"
          git config user.email "${{ secrets.GIT_EMAIL }}"
      - name: Add Upstream
        run: |
          git remote add upstream https://github.com/Vendicated/Vencord.git || true
          git fetch upstream
      - name: Backup Custom Plugins
        run: cp -r src/plugins /tmp/my_plugins
      - name: Sync with Upstream
        run: |
          git merge upstream/main -X theirs --no-edit || true
          git checkout HEAD -- src/plugins/
          git add .
          git diff --cached --quiet || git commit -m "chore: sync with upstream"
      - name: Restore Custom Plugins
        run: |
          cp -r /tmp/my_plugins/* src/plugins/
          git add src/plugins/
          git diff --cached --quiet || git commit -m "chore: restore custom plugins after sync"
      - name: Push
        run: git push origin main --force
